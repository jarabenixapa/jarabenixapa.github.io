<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Mantenimiento</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            background-image: url('manto.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
            position: relative;
            animation: fadeIn 1s ease-in-out;
        }

        /* Overlay para mejorar legibilidad */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideDown 0.8s ease-out;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #week-number {
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        .menu-button {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .menu-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .menu-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .menu-button:hover {
            transform: scale(1.05);
            background: darkred;
            border-color: darkred;
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.4);
        }

        .menu-button:active {
            transform: scale(0.95);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            width: 100%;
        }

        .question {
            font-size: 2rem;
            margin-bottom: 30px;
            color: white;
            text-align: center;
            font-weight: 700;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            animation: scaleIn 0.8s ease-out, float 4s ease-in-out infinite;
            position: relative;
        }

        .question::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, white, transparent);
            animation: shimmer 2s infinite;
        }

        .tools-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            animation: scaleIn 0.8s ease-out 0.2s both;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tool-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 20px 15px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            animation: scaleIn 0.6s ease-out;
            animation-fill-mode: both;
        }

        /* Animación escalonada para los items */
        .tool-item:nth-child(1) { animation-delay: 0.1s; }
        .tool-item:nth-child(2) { animation-delay: 0.15s; }
        .tool-item:nth-child(3) { animation-delay: 0.2s; }
        .tool-item:nth-child(4) { animation-delay: 0.25s; }
        .tool-item:nth-child(5) { animation-delay: 0.3s; }
        .tool-item:nth-child(6) { animation-delay: 0.35s; }
        .tool-item:nth-child(7) { animation-delay: 0.4s; }
        .tool-item:nth-child(8) { animation-delay: 0.45s; }
        .tool-item:nth-child(9) { animation-delay: 0.5s; }
        .tool-item:nth-child(10) { animation-delay: 0.55s; }
        .tool-item:nth-child(11) { animation-delay: 0.6s; }
        .tool-item:nth-child(12) { animation-delay: 0.65s; }

        .tool-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .tool-item:hover::before {
            left: 100%;
        }

        .tool-item:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(139, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 30px rgba(139, 0, 0, 0.4), 0 0 0 2px rgba(255, 255, 255, 0.1) inset;
        }

        .tool-item:active {
            transform: translateY(-5px) scale(0.98);
        }

        .tool-image {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 12px;
            transition: all 0.4s ease;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        .tool-item:hover .tool-image {
            transform: rotate(5deg) scale(1.1);
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.4));
        }

        .tool-label {
            color: white;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
            position: relative;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        .tool-item:hover .tool-label {
            background: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
        }

        .password-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: scaleIn 0.4s ease-out;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .password-container input {
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
            width: 250px;
        }

        .password-container input:focus {
            outline: none;
            border-color: darkred;
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .password-container input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .password-container button {
            background: linear-gradient(135deg, darkred, #8b0000);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .password-container button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .password-container button:hover::before {
            width: 300px;
            height: 300px;
        }

        .password-container button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #a52a2a, #8b0000);
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.4);
        }

        .password-container button:active {
            transform: scale(0.95);
        }

        .footer {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
            padding: 15px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.8s ease-out;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        /* Responsive Design */
        @media screen and (max-width: 1024px) {
            .tools-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media screen and (max-width: 768px) {
            .tools-container {
                grid-template-columns: repeat(2, 1fr);
                max-width: 500px;
                gap: 15px;
                padding: 20px;
            }
            
            .tool-image {
                width: 60px;
                height: 60px;
            }
            
            .tool-label {
                font-size: 0.85rem;
            }

            .question {
                font-size: 1.8rem;
            }

            .header {
                padding: 15px 20px;
            }
        }

        @media screen and (max-width: 480px) {
            .tools-container {
                grid-template-columns: 1fr;
                max-width: 300px;
            }
            
            .tool-item {
                flex-direction: row;
                justify-content: flex-start;
                padding: 12px 15px;
            }
            
            .tool-image {
                width: 50px;
                height: 50px;
            }
            
            .question {
                font-size: 1.5rem;
            }

            #week-number {
                font-size: 1rem;
            }

            .menu-button {
                padding: 8px 20px;
                font-size: 0.9rem;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .main-content {
                justify-content: flex-start;
                padding: 20px;
            }

            .tools-container {
                grid-template-columns: repeat(4, 1fr);
                max-width: 100%;
                padding: 15px;
                gap: 10px;
            }

            .tool-item {
                padding: 10px;
            }

            .question {
                font-size: 1.3rem;
                margin-bottom: 15px;
            }
        }

        /* Clase para loading state */
        .loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div id="week-number">Semana 50</div>
        <button class="menu-button" id="menu-btn">
            <span>🏠 Menú Principal</span>
        </button>
    </header>

    <main class="main-content">
        <div class="question">🔧 Mantenimiento Nixapa</div>
        
        <div class="tools-container" id="toolsContainer">
            <div class="tool-item" id="mangyver">
                <img src="mangyver.png" alt="Mangyver" class="tool-image" loading="lazy">
                <div class="tool-label">Mangyver</div>
            </div>
            <div class="tool-item" id="seguridadterritorial">
                <img src="seguridadterritorial.png" alt="Seguridad Territorial" class="tool-image" loading="lazy">
                <div class="tool-label">Seguridad Territorial</div>
            </div>
            <div class="tool-item" id="acadia">
                <img src="A.png" alt="Acadia" class="tool-image" loading="lazy">
                <div class="tool-label">Acadia</div>
            </div>
            <div class="tool-item" id="rutinas">
                <img src="I.png" alt="InteractionLog" class="tool-image" loading="lazy">
                <div class="tool-label">InteractionLog</div>
            </div>
            <div class="tool-item" id="autonomo">
                <img src="autónomo.png" alt="Autónomo" class="tool-image" loading="lazy">
                <div class="tool-label">Autónomo</div>
            </div>
            <div class="tool-item" id="sharepoint">
                <img src="manto.png" alt="Sharepoint" class="tool-image" loading="lazy">
                <div class="tool-label">Sharepoint Mantenimiento</div>
            </div>
            <div class="tool-item" id="ato">
                <img src="ato.png" alt="ATO" class="tool-image" loading="lazy">
                <div class="tool-label">ATO</div>
            </div>
            <div class="tool-item" id="cambio">
                <img src="T.png" alt="Tablero de Cambio" class="tool-image" loading="lazy">
                <div class="tool-label">Tablero Cambio Turno</div>
            </div>
            <div class="tool-item" id="guardian">
                <img src="G.png" alt="Guardian" class="tool-image" loading="lazy">
                <div class="tool-label">Guardian</div>
            </div>
            <div class="tool-item" id="sellos">
                <img src="r.png" alt="Reporte de sellos" class="tool-image" loading="lazy">
                <div class="tool-label">Reporte de sellos</div>
            </div>
            <div class="tool-item" id="Repuestos">
                <img src="re.png" alt="Repuestos" class="tool-image" loading="lazy">
                <div class="tool-label">Repuestos</div>
            </div>
            <div class="tool-item" id="Costos">
                <img src="costos.png" alt="Costos" class="tool-image" loading="lazy">
                <div class="tool-label">Costos</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        © 2026 Sitio Web Jarabe · Planta Nixapa 👻 · Todos los derechos reservados
    </footer>

    <script>
        // Función para obtener el número de semana
        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            let yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            let weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return weekNo;
        }

        // Actualizar número de semana con animación
        const weekElement = document.getElementById('week-number');
        weekElement.textContent = `Semana ${getWeekNumber(new Date())}`;
        weekElement.style.animation = 'pulse 0.5s ease';

        // Función para navegación con efecto de carga
        function navigateWithEffect(url, element) {
            if (!url) return;
            
            // Agregar clase de loading al elemento
            element.classList.add('loading');
            
            // Pequeño retraso para mostrar el efecto
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }

        // Configurar event listeners para cada tool-item
        const toolItems = document.querySelectorAll('.tool-item');
        const links = {
            'mangyver': 'https://mazsupplyapps.ab-inbev.com/mangyver',
            'seguridadterritorial': 'https://seguridadterritorial-64f0f.web.app/',
            'acadia': 'https://ab-inbev.acadia.sysalli.com/browse',
            'rutinas': 'https://interactionlog.ab-inbev.com/home',
            'autonomo': 'https://anheuserbuschinbev.sharepoint.com/sites/JARABESCSD/Archivos%20ETO/Forms/AllItems.aspx?id=%2Fsites%2FJARABESCSD%2FArchivos%20ETO%2FMANTENIMIENTO%2FAUTONOMOS%202026&viewid=0ab03584%2D2910%2D4957%2D9d8a%2Dc14493b3797e',
            'sharepoint': 'https://anheuserbuschinbev.sharepoint.com/sites/JARABECENTRODEVALVULASYBOMBAS',
            'ato': 'ato.html',
            'cambio': 'https://anheuserbuschinbev.sharepoint.com/:x:/r/sites/JARABECENTRODEVALVULASYBOMBAS/_layouts/15/Doc.aspx?sourcedoc=%7BF8F592E9-4116-41C0-816F-017AEB09A2BE%7D&file=TABLERO%20DE%20CAMBIO%20DE%20TURNO%202026%20BYV.xlsx&action=default&mobileredirect=true',
            'guardian': 'https://guardian.ab-inbev.com/',
            'sellos': 'https://mantenimiento-1dba9.web.app/',
            'Repuestos': 'https://anheuserbuschinbev.sharepoint.com/sites/JARABESCSD/Archivos%20ETO/Forms/AllItems.aspx?id=%2Fsites%2FJARABESCSD%2FArchivos%20ETO%2FMANTENIMIENTO%2FATO%20REPUESTOS&viewid=0ab03584%2D2910%2D4957%2D9d8a%2Dc14493b3797e',
            'Costos': 'https://anheuserbuschinbev.sharepoint.com/:x:/r/sites/JARABECENTRODEVALVULASYBOMBAS/_layouts/15/Doc.aspx?sourcedoc=%7B39890654-97EA-4E79-A3EB-517C86F52B07%7D&file=Resumen%20indicadores%20bombas%20y%20valvulas.xlsx&action=default&mobileredirect=true'
        };

        toolItems.forEach(item => {
            item.addEventListener('click', (e) => {
                const id = item.id;
                const url = links[id];
                if (url) {
                    navigateWithEffect(url, item);
                }
            });

            // Efecto de vibración sutil en hover (opcional)
            item.addEventListener('mouseenter', () => {
                item.style.animation = 'pulse 0.5s ease';
            });

            item.addEventListener('mouseleave', () => {
                item.style.animation = '';
            });
        });

        // Botón de menú principal
        const menuBtn = document.getElementById('menu-btn');
        menuBtn.addEventListener('click', (e) => {
            navigateWithEffect('index.html', menuBtn);
        });

        // Efecto de aparición escalonada mejorado
        window.addEventListener('load', () => {
            toolItems.forEach((item, index) => {
                item.style.animation = `scaleIn 0.6s ease-out ${index * 0.05}s both`;
            });
        });

        // Detectar si es dispositivo móvil para ajustar animaciones
        if ('ontouchstart' in window) {
            document.body.classList.add('touch-device');
        }

        // Prevenir que los botones mantengan el estado hover en dispositivos táctiles
        document.addEventListener('touchstart', () => {}, {passive: true});
    </script>
</body>
</html>
